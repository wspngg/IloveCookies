<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discord Webhook Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo svg {
      width: 40px;
      height: 40px;
    }

    .logo h1 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .logo span {
      color: #5865F2;
    }

    label {
      display: block;
      color: #a0aec0;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], textarea {
      width: 100%;
      background: #0f3460;
      border: 1px solid #1a4a7a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #5865F2;
    }

    input[type="text"] {
      margin-bottom: 20px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      margin-bottom: 24px;
    }

    input::placeholder, textarea::placeholder {
      color: #4a5568;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #5865F2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    button:hover { background: #4752c4; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #3c4369; cursor: not-allowed; }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
    }

    .status.success {
      display: block;
      background: #1a3a2e;
      border: 1px solid #2f855a;
      color: #68d391;
    }

    .status.error {
      display: block;
      background: #3a1a1a;
      border: 1px solid #c53030;
      color: #fc8181;
    }

    .hint {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #4a5568;
      text-align: center;
      line-height: 1.5;
    }

    .hint a {
      color: #5865F2;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <!-- Logo Discord SVG -->
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path fill="#5865F2" d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    <h1>Discord <span>Webhook</span></h1>
  </div>

  <label for="webhookUrl">URL du Webhook</label>
  <input
    type="text"
    id="webhookUrl"
    placeholder="https://discord.com/api/webhooks/..."
  />

  <label for="message">Ton message</label>
  <textarea
    id="message"
    placeholder="Écris ta phrase ici..."
  ></textarea>

  <button id="sendBtn" onclick="envoyer()">🚀 Envoyer sur Discord</button>

  <div class="status" id="status"></div>

  <p class="hint">
    Tu n'as pas encore de webhook ?
    <a href="https://support.discord.com/hc/fr/articles/228383668" target="_blank">Voir comment en créer un →</a>
  </p>

</div>

<script>
  async function envoyer() {
    const webhookUrl = document.getElementById("webhookUrl").value.trim();
    const message = document.getElementById("message").value.trim();
    const btn = document.getElementById("sendBtn");
    const status = document.getElementById("status");

    // Reset
    status.className = "status";
    status.textContent = "";

    // Validation
    if (!webhookUrl) {
      afficherStatus("error", "❌ Merci de renseigner l'URL du webhook.");
      return;
    }
    if (!webhookUrl.startsWith("https://discord.com/api/webhooks/")) {
      afficherStatus("error", "❌ L'URL ne ressemble pas à un webhook Discord valide.");
      return;
    }
    if (!message) {
      afficherStatus("error", "❌ Le message est vide !");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Envoi en cours...";

    try {
      const response = await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: message,
          username: "Mon Site Web",
        })
      });

      if (response.ok) {
        afficherStatus("success", "✅ Message envoyé sur Discord !");
        document.getElementById("message").value = "";
      } else {
        const err = await response.json().catch(() => ({}));
        afficherStatus("error", `❌ Erreur Discord : ${err.message || response.status}`);
      }
    } catch (e) {
      afficherStatus("error", "❌ Impossible de contacter Discord. Vérifie ton URL.");
    }

    btn.disabled = false;
    btn.textContent = "🚀 Envoyer sur Discord";
  }

  function afficherStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = "status " + type;
    el.textContent = msg;
  }

  // Envoi avec Entrée (Ctrl+Enter dans le textarea)
  document.getElementById("message").addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "Enter") envoyer();
  });
</script>

</body>
</html>
